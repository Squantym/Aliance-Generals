# ===================================================================
# nginx.example.conf — конфигурация nginx для игры «ГЕНЕРАЛЫ»
#
# СТРАТЕГИЯ ЭКОНОМИИ ТРАФИКА:
#   1. Статику (JS/CSS/картинки) nginx отдаёт НАПРЯМУЮ с диска, минуя
#      Node.js — это быстрее и снимает нагрузку с приложения.
#   2. gzip сжатие на лету для текстовых файлов (~75% экономии).
#      Если соберёте nginx с модулем brotli — раскомментируйте brotli-блок.
#   3. Долгосрочное кэширование (год) для версионированных файлов и
#      картинок. Повторные заходы игроков = 0 байт трафика.
#   4. open_file_cache — nginx держит дескрипторы файлов в памяти.
#   5. API проксируется в Node.js (там своё сжатие из compress.js).
#
# Применение:
#   sudo cp nginx.example.conf /etc/nginx/sites-available/generals
#   sudo ln -s /etc/nginx/sites-available/generals /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo nginx -s reload
#
# ВАЖНО: замените /path/to/generals-game/public на реальный путь!
# ===================================================================

server_tokens off;

# ── gzip сжатие (встроено в nginx) ──
gzip              on;
gzip_vary         on;
gzip_comp_level   6;
gzip_min_length   256;
gzip_proxied      any;
gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    image/svg+xml
    font/woff
    font/woff2;

# ── brotli (если nginx собран с ngx_brotli) — лучше gzip на ~15% ──
# brotli            on;
# brotli_comp_level 6;
# brotli_static     on;
# brotli_types
#     text/plain text/css application/javascript application/json
#     image/svg+xml font/woff font/woff2;

# ── Кэш открытых файлов в памяти nginx ──
open_file_cache          max=2000 inactive=5m;
open_file_cache_valid    2m;
open_file_cache_min_uses 1;
open_file_cache_errors   on;

server {
    listen 443 ssl;
    http2 on;
    server_name aliance-general.ru www.aliance-general.ru;

    ssl_certificate     /etc/letsencrypt/live/aliance-general.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aliance-general.ru/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Корень со статикой игры — ЗАМЕНИТЕ путь на реальный!
    root /path/to/generals-game/public;

    # HTTP security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options           "SAMEORIGIN" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy   "default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; img-src 'self' data:;" always;

    # ── Картинки: кэш на ГОД, immutable ──
    # Главная экономия при добавлении множества фото: каждый игрок
    # скачивает картинку ОДИН раз, дальше браузер берёт из кэша.
    location ~* \.(png|jpe?g|webp|gif|svg|ico|avif)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
        try_files $uri =404;
    }

    # ── Шрифты: кэш на год ──
    location ~* \.(woff2?|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
        try_files $uri =404;
    }

    # ── CSS/JS: immutable на год (версионируются хэшем в HTML) ──
    location ~* \.(css|js)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # ── API → Node.js (там своё сжатие) ──
    location /api/ {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_buffering    off;
    }

    # ── HTML/SPA-вход → Node.js (подставляет хэши в HTML) ──
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    server_name aliance-general.ru www.aliance-general.ru;
    return 301 https://$host$request_uri;
}

# ===================================================================
# БЕЗ nginx (только Node.js): всё работает из коробки — compress.js
# жмёт ответы, serveStatic ставит ETag/304 и долгий кэш. nginx добавляет
# скорость и снимает нагрузку, но не обязателен.
# ===================================================================
