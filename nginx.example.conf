# ===================================================================
# nginx.example.conf — пример конфигурации nginx для игры «ГЕНЕРАЛЫ»
#
# Исправляет:
#   БАГ 21: HTTP security headers
#   БАГ 22: скрытие версии nginx
#
# Применение:
#   sudo cp nginx.example.conf /etc/nginx/sites-available/generals
#   sudo ln -s /etc/nginx/sites-available/generals /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo nginx -s reload
# ===================================================================

# БАГ 22: скрыть версию nginx в заголовке Server
server_tokens off;

server {
    listen 443 ssl http2;
    server_name aliance-general.ru www.aliance-general.ru;

    ssl_certificate     /etc/letsencrypt/live/aliance-general.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aliance-general.ru/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # БАГ 21: HTTP security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options           "SAMEORIGIN" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy   "default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; img-src 'self' data:;" always;

    # Проксируем на Node.js
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}

# Редирект HTTP → HTTPS
server {
    listen 80;
    server_name aliance-general.ru www.aliance-general.ru;
    return 301 https://$host$request_uri;
}
