<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <meta name="description" content="Альянс Генералов — браузерная военная стратегия. Командуй армией, побеждай противников, становись лучшим генералом!">
  <meta name="robots" content="index, follow">
  <title>Альянс Генералов — браузерная военная игра</title>
  <!-- БАГ 14: favicon -->
  <link rel="icon" type="image/png" href="/favicon.png">

  <!-- PWA: установка на телефон (иконка на рабочем столе, полноэкранный режим) -->
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0a0d08">
  <meta name="mobile-web-app-capable" content="yes">
  <!-- iOS: свой набор мета-тегов, стандартные он не понимает -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Генералы">
  <link rel="apple-touch-icon" href="/img/pwa/apple-touch-icon-180.png">

  <link rel="stylesheet" href="/css/style.css">
  <style>
    /* БАГ 8: запрет горизонтального скролла на мобильных */
    *, *::before, *::after { box-sizing: border-box; }
    html, body { overflow-x: hidden; max-width: 100%; }
  </style>
</head>
<body>
  <!-- Колонка игры: шапка с ресурсами + сменное содержимое экрана -->
  <div id="wrap">
    <header id="header"></header>
    <main id="content"></main>
  </div>

  <!-- Контейнер всплывающих уведомлений (награды, ошибки, события) -->
  <div id="toasts"></div>

  <!-- Порядок подключения важен: сначала ядро, потом экраны -->
  <script src="/js/api.js"></script>
  <script src="/js/ui.js"></script>
  <script src="/js/app.js"></script>
  <script src="/js/screens/core.js"></script>
  <script src="/js/screens/war.js"></script>
  <script src="/js/screens/economy.js"></script>
  <script src="/js/screens/market.js"></script>
  <script src="/js/screens/social.js"></script>
  <script src="/js/screens/saboteurs.js"></script>
  <script src="/js/screens/news.js"></script>
  <script>App.init();</script>
</body>
</html>
